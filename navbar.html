
<!DOCTYPE html>
<html>
<head>
    <title>Simple Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            background-color: #2874f0;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .search-box {
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .search-box input {
            padding: 5px;
        }

        .search-box button {
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="#">Flipkart</a>
        <a href="https://www.flipkart.com/">Home</a>
        <a href="https://www.flipkart.com/products/">Products</a>
        <a href="https://www.flipkart.com/cart/">Cart</a>

        <!-- Search on RIGHT -->
        <div class="search-box">
            <input type="text" placeholder="Search">
            <button>🔍</button>
        </div>
    </div>

</body>
</html>
